# Server Configuration
# Usually located at /etc/nginx/nginx.conf or /etc/nginx/conf.d/atomx.conf

# Define Upstreams
upstream frontend_app {
    # Matches docker-compose.yml mapping 3002:3000
    server 127.0.0.1:3002;
}

upstream supabase_kong {
    # Default Kong port for Supabase
    server 127.0.0.1:8000;
}

# 1. Frontend Application (www.atomx.top)
server {
    listen 80;
    server_name www.atomx.top atomx.top;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name www.atomx.top atomx.top;

    # SSL Configuration (Adjust paths as needed)
    ssl_certificate /etc/letsencrypt/live/atomx.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atomx.top/privkey.pem;

    location /miniapp/ {
        alias /var/www/miniapp/;
        try_files $uri $uri/ /miniapp/index.html;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. Supabase API (supabase-api.atomx.top)
server {
    listen 80;
    server_name supabase-api.atomx.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name supabase-api.atomx.top;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/atomx.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/atomx.top/privkey.pem;

    location / {
        proxy_pass http://supabase_kong;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Increased timeouts for long API calls
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
