services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_URL: ${DIRECT_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Emergency switch: set to 1 in .env to bypass prisma db push at startup.
      - SKIP_PRISMA_DB_PUSH=${SKIP_PRISMA_DB_PUSH:-0}
      # Emergency switch: set to 0 in .env to allow startup even if db push fails.
      - PRISMA_DB_PUSH_REQUIRED=${PRISMA_DB_PUSH_REQUIRED:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - skills_data:/app/data/skills
    expose:
      - "3000"
    networks:
      - app_network

  nginx:
    image: nginx:1.27-alpine
    container_name: content-factory-web
    restart: always
    depends_on:
      - web
    ports:
      - "3002:80"
    volumes:
      - ./deploy/nginx/content-factory.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  skills_data:
