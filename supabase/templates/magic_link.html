<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <title>验证码登录</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: #f5f7fa;
        color: #1f2a37;
        margin: 0;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
      }
      .brand {
        font-size: 18px;
        font-weight: 600;
        color: #1f64ff;
        margin-bottom: 16px;
        letter-spacing: 0.2px;
      }
      .greeting {
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 24px;
      }
      .otp-label {
        font-size: 14px;
        color: #7c8db5;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .otp {
        font-size: 36px;
        font-weight: 700;
        color: #111826;
        text-align: center;
        padding: 18px;
        border-radius: 12px;
        background: linear-gradient(120deg, #edf4ff, #f9f5ff);
        border: 1px solid #dbeafe;
        letter-spacing: 8px;
      }
      .meta {
        font-size: 14px;
        color: #4b5563;
        margin-top: 24px;
        line-height: 1.6;
      }
      .footer {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 32px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">NexTide 内容工厂</div>
      <div class="greeting">
        您好 {{ .Email }}，请使用以下一次性验证码完成登录或注册。
      </div>
      <div class="otp-label">一次性验证码</div>
      <div class="otp">{{ .Token }}</div>
      <div class="meta">
        该验证码将在 10 分钟内失效。若非本人操作，请忽略本邮件，无需进行其他步骤。
      </div>
      <div class="meta">
        若您期望通过链接完成验证，请点击：
        <a href="{{ .ConfirmationURL }}" style="color:#2563eb; text-decoration:none;">立即验证</a>
      </div>
      <div class="footer">
        本邮件由系统自动发送，请勿直接回复。<br />
        您收到此邮件是因为在 NexTide 内容工厂使用邮箱登录或注册。
      </div>
    </div>
  </body>
</html>
